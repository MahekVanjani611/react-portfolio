<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <rect width="600" height="340" fill="#141414"/>
  <!-- graph/network nodes representing RAG + agent reasoning -->
  <g stroke="#D9FB06" stroke-width="1.5" opacity="0.55">
    <line x1="120" y1="120" x2="240" y2="90"/>
    <line x1="240" y1="90" x2="360" y2="130"/>
    <line x1="360" y1="130" x2="470" y2="90"/>
    <line x1="240" y1="90" x2="260" y2="220"/>
    <line x1="360" y1="130" x2="330" y2="230"/>
    <line x1="120" y1="120" x2="150" y2="240"/>
