  <text x="30" y="40" font-family="monospace" font-size="22" fill="#D9FB06" font-weight="700">RAG · Agent</text>
  <text x="30" y="310" font-family="monospace" font-size="14" fill="#888">retrieval → reasoning → answer</text>
